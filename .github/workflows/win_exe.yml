name: Compilar Eclipse-HM Windows

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Descargar el repositorio completo
      - name: Checkout del código
        uses: actions/checkout@v3

      # 2. Configurar el entorno de Flutter
      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.2'
          channel: 'stable'
          cache: true

      # 3. SOLUCIÓN INTEGRAL: Instalar las herramientas de compilación de Visual Studio 2019
      - name: Instalar herramientas de Visual Studio 2019
        uses: microsoft/setup-msbuild@v2

      # 4. Forzar el soporte para aplicaciones de escritorio en Windows
      - name: Habilitar Windows Config
        run: flutter config --enable-windows-desktop

      # 5. Limpieza profunda de CMake y Flutter residual
      - name: Limpieza profunda de CMake y Flutter
        run: |
          flutter clean
          if (Test-Path windows\flutter\ephemeral) { Remove-Item -Recurse -Force windows\flutter\ephemeral }
          if (Test-Path build) { Remove-Item -Recurse -Force build }

      # 6. Descargar dependencias limpias de la app
      - name: Instalar dependencias
        run: flutter pub get

      # 7. Instalar y renderizar tus logos personalizados de Eclipse-HM
      - name: Generar Iconos de la App
        run: |
          flutter pub add --dev flutter_launcher_icons
          flutter pub run flutter_launcher_icons

      # 8. COMPILACIÓN NATIVA DIRECTA
      # El servidor ahora sí tiene el entorno de 2019 activo listo para CMake
      - name: Compilar ejecutable oficial de Windows
        run: flutter build windows --release --dart-define FLUTTER_BUILD_NAME=1.12.2 --dart-define FLUTTER_BUILD_NUMBER=27

      # 9. EMPAQUETADO AUTOMÁTICO EN ZIP
      - name: Crear paquete ZIP de la aplicación
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath dist\Eclipse-HM-Windows-x64.zip

      # 10. Guardar tu .zip final en los artefactos de GitHub
      - name: Subir Paquete como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Eclipse-HM-Windows-Package
          path: dist/
