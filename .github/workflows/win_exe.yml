name: Compilar Eclipse-HM Windows

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    # SOLUCIÓN: Cambiamos a un servidor Windows que SÍ tiene Visual Studio instalado
    runs-on: windows-latest

    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout del código
        uses: actions/checkout@v3

      # 2. Configurar Java JDK (Por si acaso lo requiere alguna dependencia)
      - name: Configurar Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Instalar y configurar Flutter
      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.2'
          channel: 'stable'
          cache: true

      # 4. Habilitar el soporte de Windows en Flutter
      - name: Habilitar Windows Config
        run: flutter config --enable-windows-desktop

      # 5. Instalar de forma global el empaquetador del proyecto
      - name: Instalar Flutter Distributor
        run: flutter pub global activate flutter_distributor

      # 6. Limpieza profunda e instalación de dependencias
      - name: Instalar dependencias
        run: |
          flutter pub clean
          flutter pub get

      # 7. Generar tus nuevos iconos de Eclipse-HM
      - name: Generar Iconos de la App
        run: flutter pub run flutter_launcher_icons

      # 8. COMPILACIÓN: Ejecuta el empaquetador usando las herramientas nativas de Windows
      - name: Compilar ejecutable con Distributor
        run: flutter pub global run flutter_distributor package --platform=windows --targets=exe

      # 9. Subir el instalador/ejecutable resultante (.exe)
      - name: Subir Ejecutable como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Eclipse-HM-Windows-EXE
          path: dist/
