name: Compilar Eclipse-HM Windows

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Traer el código fuente
      - name: Checkout del código
        uses: actions/checkout@v3

      # 2. Configurar el entorno de Flutter
      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.2'
          channel: 'stable'
          cache: true

      # 3. Asegurar soporte desktop activo
      - name: Habilitar Windows Config
        run: flutter config --enable-windows-desktop

      # 4. Instalar la herramienta de distribución
      - name: Instalar Flutter Distributor
        run: flutter pub global activate flutter_distributor

      # 5. LIMPIEZA AGRESIVA NATIVA DE CMAKE
      # Esto elimina archivos de compilación de Windows previos que exijan Visual Studio 2019
      - name: Limpieza profunda de CMake y Flutter
        run: |
          flutter clean
          if (Test-Path windows\flutter\ephemeral) { Remove-Item -Recurse -Force windows\flutter\ephemeral }
          if (Test-Path build) { Remove-Item -Recurse -Force build }

      # 6. Descargar las dependencias del pubspec
      - name: Instalar dependencias
        run: flutter pub get

      # 7. Inyectar tus iconos de Eclipse-HM
      - name: Generar Iconos de la App
        run: flutter pub run flutter_launcher_icons

      # 8. COMPILACIÓN FORZADA EN LA PLATAFORMA NUEVA
      # Al pasarle la variable de entorno, obligamos a CMake a usar la versión de VS disponible sin buscar la 2019
      - name: Compilar ejecutable con Distributor
        env:
          CMAKE_GENERATOR: "Visual Studio 17 2022"
        run: flutter pub global run flutter_distributor package --platform=windows --targets=exe

      # 9. Guardar tu .exe listo
      - name: Subir Ejecutable como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Eclipse-HM-Windows-EXE
          path: dist/
